services:
  mysql-db:
    image: mysql:8.0
    container_name: phishing-mysql
    environment:
      MYSQL_ROOT_PASSWORD: your_password_here
      MYSQL_DATABASE: phishing_db
    ports:
      - "3307:3306"
    networks:
      - phishing-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pyour_password_here"]
      interval: 10s
      timeout: 10s
      retries: 20

  python-api:
    build: ./TRAINING
    container_name: phishing-python
    ports:
      - "5002:5002"
    networks:
      - phishing-network

  java-api:
    build: ./Major
    container_name: phishing-java
    ports:
      - "8080:8080"
    depends_on:
      mysql-db:
        condition: service_healthy
      python-api:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/phishing_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: your_password_here
      PYTHON_API_URL: http://python-api:5002
    networks:
      - phishing-network

networks:
  phishing-network:
    driver: bridge