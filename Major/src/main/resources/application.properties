# Python API URL (Render cloud)
python.api.url=https://phishing-python-api.onrender.com

# MySQL Database (Aiven cloud)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://phishing-mysql-phishing-detection-project.g.aivencloud.com:19994/defaultdb?ssl-mode=REQUIRED
spring.datasource.username=avnadmin
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Server port
server.port=8080